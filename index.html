<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <icon rel="icon" type="image/png" href="/images/logolight.png">
    <title>LUMA</title>
</head>
<body>
    <div class="container-box">
        <div class="form-box">
            <img src="/images/logolight.png" alt="LUMA logo" id="logo">
            <h1>LUMA</h1>
            <h2>Let's do this!</h2>
            <form action="#">
                <div>
                    <label for="first_name">FIRST NAME*</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div>
                    <label for="last_name">LAST NAME*</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div>
                    <label for="email">EMAIL*</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="phone">PHONE NUMBER*</label>
                    <input type="number" id="phone" name="phone" required>
                </div>
                <div>
                    <label for="user_password">PASSWORD*</label>
                    <input type="password" id="user_password" name="user_password" required>
                </div>
                <div>
                    <label for="conf_password">CONFIRM PASSWORD*</label>
                    <input type="password" id="conf_password" name="conf_password" required>
                </div>

                <button type="submit">CREATE ACCOUNT</button>
                <p>Already have an account? <a href="">Log in</a></p>
            </form>
        </div>
        <div class="image-box">
            <p>IMAGE BY <a href="https://unsplash.com/@jeremybishop" target="_blank">JEREMY BISHOP</a> AT <a href="https://unsplash.com/" target="_blank">UNSPLASH</a></p>
        </div>
    </div>
</body>
</html>
